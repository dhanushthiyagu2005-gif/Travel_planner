<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>

  <style>
  body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #667eea, #764ba2);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}
.gif{
  width: 30px;
  height: 20px;
}

.login-container {
  background: rgba(255, 255, 255, 0.15);
  backdrop-filter: blur(15px);
  padding: 20px 20px;
  border-radius: 20px;
  width: 50%;
  max-width: 340px;
  text-align: center;
  color: white;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}
.login-container :hover {
  transform: scale(1.02);
}


.login-container h2 {
  margin-bottom: 5px;
  font-size: 24px;
  padding: 12px;
}

.login-container p {
  font-size: 14px;
  opacity: 0.8;
  margin-bottom: 20px;
}


input {
  width: 80%;
  padding: 12px;
  margin-top: 12px;
  border-radius: 12px;
  border: none;
  outline: none;
  font-size: 14px;
}


input:focus :hover {
  box-shadow: 0 0 0 2px #fff;
}


button {
  width: 80%;
  padding: 12px;
  margin-top: 18px;
  border: none;
  border-radius: 12px;
  background: white;
  color: #667eea;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
  transition: 0.2s;
}


button:hover {
  background: #f1f1f1;
  transform: scale(1.05);
}

.switch {
  margin-top: 15px;
  font-size: 14px;
}

.switch span {
  color: #fff;
  font-weight: bold;
  cursor: pointer;
}
.gif {
  width: 100px;
  height: 100px;
  border-radius: 50%;
  margin-bottom: 10px;
  justify-content: center;
}

  </style>
</head>

<body>


<div class="login-container">
  <h2>Login</h2>

  <form onsubmit="login(event)">

<img src="solo-traveller.gif" class="gif">
    <h2>Welcome Back!</h2>

    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">

    <button type="submit">Login</button>
  </form>
 

</div>

<script>
function login(e) {
  e.preventDefault(); 

  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  console.log("Email:", email);
  console.log("Password:", password);

  if (email === "" || password === "") {
    alert("Please enter all fields");
    return;
  }

  
  localStorage.setItem("loggedIn", "true");

  window.location.href = "home.html";


}
</script>

</body>
</html>
